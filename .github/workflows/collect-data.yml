# ASIP 数据采集定时任务配置

# 如果使用 Vercel Cron，需要创建 api/cron 端点

# 或者使用 GitHub Actions (推荐方式)

# .github/workflows/collect-data.yml
name: 定期数据采集

on:
  # 每天 UTC 0 点 (北京时间 8 点) 运行
  schedule:
    - cron: '0 0 * * *'
  # 也可以手动触发
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    environment: Production – asip-mvp
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || secrets.SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ========== 前置验证步骤 ==========
      - name: Verify Supabase connection
        run: |
          echo "🔍 验证 Supabase 连接..."
          node -e "
            const { createClient } = require('@supabase/supabase-js');
            const supabase = createClient(process.env.NEXT_PUBLIC_SUPABASE_URL, process.env.NEXT_PUBLIC_SUPABASE_ANON_KEY);
            supabase.from('cases').select('id').limit(1).then(({ data, error }) => {
              if (error) {
                console.error('❌ Supabase 连接失败:', error.message);
                process.exit(1);
              }
              console.log('✅ Supabase 连接成功');
            });
          "
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Verify LLM API
        run: |
          echo "🔍 验证 DashScope LLM API..."
          node -e "
            const axios = require('axios');
            axios.post(
              'https://dashscope.aliyuncs.com/api/v1/services/aigc/text-generation/generation',
              { model: 'qwen-plus', input: { prompt: 'hi' }, parameters: { result_format: 'message' } },
              { headers: { 'Authorization': 'Bearer ' + process.env.DASHSCOPE_API_KEY, 'Content-Type': 'application/json' } }
            ).then(() => {
              console.log('✅ LLM API 连接成功');
            }).catch(err => {
              console.error('❌ LLM API 失败:', err.response?.data?.message || err.message);
              process.exit(1);
            });
          "
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
      # ========== 验证结束 ==========

      # ========== 数据采集 (一次性采集所有数据源) ==========
      - name: Collect all data sources
        run: node scripts/collect-all.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Import to database
        run: node scripts/import-merged.js

      - name: Run LLM extraction
        run: node scripts/extract-db.js
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
